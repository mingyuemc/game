<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号密码查寻器</title>
    <style>
        /* 简洁样式 (保持不变) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: #4a5568;
            font-size: 1rem;
            border-left: 4px solid #4299e1;
            padding-left: 1rem;
            text-align: left;
        }

        /* 查询面板 */
        .query-panel {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }

        .query-header {
            margin-bottom: 1.5rem;
        }

        .query-header label {
            font-weight: 600;
            color: #2d3748;
            display: block;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        #numberInput {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-family: monospace;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        #numberInput:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        button.primary {
            width: 100%;
            padding: 1rem;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.primary:hover {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 153, 225, 0.4);
        }

        /* 结果区域 */
        .result-section {
            margin-top: 1.5rem;
        }

        .result-header {
            margin-bottom: 1rem;
            color: #2d3748;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .result-container {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1.5rem;
            min-height: 200px;
            border: 1px solid #e9ecef;
        }

        .placeholder-message {
            color: #a0aec0;
            text-align: center;
            padding: 2rem 1rem;
            font-style: italic;
        }

        /* 结果卡片样式 (调整了双引号的部分) */
        .result-card {
            background: white;
            border-radius: 1rem;
            padding: 1.2rem;
            border: 1px solid #e9ecef;
        }

        .result-number {
            color: #2c5282;
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed #cbd5e0;
        }

        .result-number span {
            background: #ebf8ff;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .strings-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .string-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .string-label {
            font-size: 0.8rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .string-value {
            font-family: monospace;
            font-size: 1.3rem;
            color: #276749;
            background: #f0fff4;
            padding: 0.5rem 1rem;
            border-radius: 0.8rem;
            border-left: 4px solid #48bb78;
            word-break: break-all;
        }

        .error-message {
            color: #c53030;
            background: #fff5f5;
            padding: 1rem;
            border-radius: 0.8rem;
            border-left: 4px solid #fc8181;
            font-family: monospace;
        }

        .hint {
            margin-top: 1rem;
            color: #718096;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>种子 → 账号密码</h1>
            <p class="subtitle">输入种子，查询对应的账号和密码</p>
        </header>

        <!-- 简洁查询面板，无预设列表 -->
        <div class="query-panel">
            <div class="query-header">
                <label for="numberInput">🔎 输入种子</label>
                <input type="text" id="numberInput" placeholder="例如: 00000" autocomplete="off" inputmode="numeric">
                <button id="queryBtn" class="primary">查询</button>
            </div>

            <!-- 查询结果区域 -->
            <div class="result-section">
                <div class="result-header">
                    <span>📦 查询结果</span>
                </div>
                
                <div id="resultContainer" class="result-container">
                    <div class="placeholder-message">
                        输入数字，点击查询
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 简洁数字查询工具 · 去除双引号 ==========
        (function() {
            // --- DOM 元素 ---
            const numberInput = document.getElementById('numberInput');
            const queryBtn = document.getElementById('queryBtn');
            const resultContainer = document.getElementById('resultContainer');

            // --- 在这里设置你的数字映射关系 ---
            const dataMap = {
                "97955": ["PS262P1", "activelyafraidall"],
                "31835": ["PS262P2", "alsoanswerarm"],
                "22944": ["PS262P3", "artclubaskbad"],
                "40750": ["POA262P1","basketballbikeboat"],
                "49697": ["POA262P2","borrowborrowbooksbring"],
                "74756": ["POA262P3","busbuycan"],
                "14462": ["GOF262P1","carchildchocolate"],
                "95250": ["GOF262P2","classcleantheroom"],
                "41405": ["GOF262P3","clothescoachcoat"],
                "24744":["OOTP262P1","cousindear"],
                "22429":["OOTP262P2","dohousework"],
                "14860":["OOTP262P3","dothehighjump"],
                "81692":["HBP262P1","dothelongjump"],
                "64582":["HBP262P2","dragonfruitear"],
                "27230":["HBP262P3","eatEnglishlesson"],
                "48302":["DH262P1","facefavourite"],
                "55818":["DH262P2","feelfoot"],
                "81753":["DH262P3","footballfor"]
            };
            // ------------------------------------

            // --- 查询函数 ---
            function queryNumber() {
                const input = numberInput.value.trim();
                
                // 空输入检查
                if (!input) {
                    renderPlaceholder('请输入种子');
                    return;
                }

                // 检查是否为纯数字
                if (!/^\d+$/.test(input)) {
                    renderError('请输入有效的种子（只包含0-9的三位数字）');
                    return;
                }

                // 查询映射表
                const result = dataMap[input];
                
                if (result) {
                    // 直接传递原始字符串，不再添加额外引号
                    renderResult(input, result[0], result[1]);
                } else {
                    renderError(`未找到种子 "${input}" 对应的字符串`);
                }
            }

            // --- 渲染结果 (关键修改：去掉了字符串两边的双引号) ---
            function renderResult(number, str1, str2) {
                const html = `
                    <div class="result-card">
                        <div class="result-number">
                            <span>${number}</span>
                        </div>
                        <div class="strings-container">
                            <div class="string-item">
                                <div class="string-label">账号</div>
                                <div class="string-value">${escapeHtml(str1)}</div>  <!-- 不再包裹引号 -->
                            </div>
                            <div class="string-item">
                                <div class="string-label">密码</div>
                                <div class="string-value">${escapeHtml(str2)}</div>  <!-- 不再包裹引号 -->
                            </div>
                        </div>
                    </div>
                `;
                resultContainer.innerHTML = html;
            }

            function renderPlaceholder(message) {
                resultContainer.innerHTML = `<div class="placeholder-message">${message}</div>`;
            }

            function renderError(message) {
                resultContainer.innerHTML = `<div class="error-message">❌ ${escapeHtml(message)}</div>`;
            }

            // 转义HTML特殊字符，但保留原始内容 (不添加额外引号)
            function escapeHtml(text) {
                if (text === undefined || text === null) return '';
                // 将文本作为纯文本处理，避免XSS，同时不会添加任何引号
                const div = document.createElement('div');
                div.textContent = text;          // 使用textContent保证纯文本，不会渲染为HTML
                return div.innerHTML;             // 返回转义后的HTML字符串 (例如 "<" 变成 "&lt;")
            }

            // --- 事件绑定 ---
            queryBtn.addEventListener('click', queryNumber);
            
            numberInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    queryNumber();
                }
            });

            // 初始状态
            renderPlaceholder('输入种子，点击查询');
        })();
    </script>
</body>
</html>
